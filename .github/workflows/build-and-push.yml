name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"
    paths:
      - "**/Dockerfile"
      - "**/docker/**/*.Dockerfile"
      - "**/src/**"
      - "**/app/**"
      - "**/backend/**"
      - "**/frontend/**"
      - ".github/workflows/build-and-push.yml"
      - "VERSION"
  pull_request:
    branches:
      - main
    paths:
      - "**/Dockerfile"
      - "**/docker/**/*.Dockerfile"
      - "**/src/**"
      - "**/app/**"
      - "**/backend/**"
      - "**/frontend/**"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g., v1.0.0)"
        required: false
        default: "latest"

permissions:
  # Required by raolivei/github-workflows docker-build.yml (nested job may request contents: write).
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    uses: raolivei/github-workflows/.github/workflows/docker-build.yml@main
    with:
      # Replace PROJECT_NAME with your repo name (e.g. my-app, my-app-api)
      image-name: PROJECT_NAME
      context: .
      # For Dockerfile in subdirectory: context: ./backend, dockerfile: Dockerfile
      platforms: linux/amd64,linux/arm64
    secrets:
      REGISTRY_TOKEN: ${{ secrets.CR_PAT || secrets.GITHUB_TOKEN }}
